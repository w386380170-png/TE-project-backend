<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>爬虫数据可视化</title>
    <!-- 引入ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .chart-container {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        .box {
            width: 50%;
            height: 400px;
            border: 1px solid #eee;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f5f5f5;
        }
        h2 {
            text-align: center;
            color: #333;
            margin: 40px 0 20px;
        }
    </style>
</head>
<body>
<h2>豆瓣电影Top100 数据可视化</h2>
<div class="chart-container">
    <div class="box" id="barChart"></div>
    <div class="box" id="pieChart"></div>
</div>

<h2>电影明细列表</h2>
<table id="movieTable">
    <tr>
        <th>电影名</th>
        <th>评分</th>
        <th>导演</th>
        <th>主演</th>
        <th>年份</th>
        <th>地区</th>
        <th>类型</th>
    </tr>
</table>

<h2>百度实时热搜Top10</h2>
<table id="hotTable">
    <tr>
        <th>热搜标题</th>
        <th>热度</th>
        <th>链接</th>
    </tr>
</table>

<script>
    // 初始化图表
    const barDom = document.getElementById('barChart');
    const pieDom = document.getElementById('pieChart');
    const barChart = echarts.init(barDom);
    const pieChart = echarts.init(pieDom);

    // 窗口自适应图表
    window.addEventListener('resize', () => {
        barChart.resize();
        pieChart.resize();
    });

    // 通用请求函数：统一错误处理
    async function requestData(url) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error("接口请求异常");
            return await res.json();
        } catch (err) {
            console.error(`请求 ${url} 失败:`, err);
            return null;
        }
    }

    // 主执行函数：串行加载，保证顺序
    async function initPage() {
        // 1. 加载评分柱状图
        let scoreData = await requestData("http://127.0.0.1:8000/api/douban/stat/score");
        if (scoreData && scoreData.code === 200 && scoreData.data.length > 0) {
            const xData = scoreData.data.map(item => item.score_range);
            const yData = scoreData.data.map(item => item.movie_count);
            barChart.setOption({
                title: { text: '电影评分分布' },
                xAxis: { type: 'category', data: xData },
                yAxis: { type: 'value' },
                series: [{ type: 'bar', data: yData }]
            });
        } else {
            barChart.setOption({ title: { text: '暂无评分数据' } });
        }

        // 2. 加载地区饼图
        let countryData = await requestData("http://127.0.0.1:8000/api/douban/stat/country");
        if (countryData && countryData.code === 200 && countryData.data.length > 0) {
            const pieData = countryData.data.map(item => ({
                name: item.country,
                value: item.movie_count
            }));
            pieChart.setOption({
                title: { text: '电影制片地区分布' },
                series: [{ type: 'pie', radius: '70%', data: pieData }]
            });
        } else {
            pieChart.setOption({ title: { text: '暂无地区数据' } });
        }

        // 3. 加载电影列表（渲染前清空旧行）
        const movieTable = document.getElementById("movieTable");
        // 保留表头，清空原有数据行
        while (movieTable.rows.length > 1) {
            movieTable.deleteRow(1);
        }
        let movieData = await requestData("http://127.0.0.1:8000/api/douban/movie/list");
        if (movieData && movieData.code === 200 && movieData.data.length > 0) {
            movieData.data.forEach(item => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${item.movie_name || ''}</td>
                    <td>${item.score || ''}</td>
                    <td>${item.director || ''}</td>
                    <td>${item.actors || ''}</td>
                    <td>${item.release_year || ''}</td>
                    <td>${item.country || ''}</td>
                    <td>${item.movie_type || ''}</td>
                `;
                movieTable.appendChild(tr);
            });
        }

        // 4. 加载百度热搜（渲染前清空旧行）
        const hotTable = document.getElementById("hotTable");
        while (hotTable.rows.length > 1) {
            hotTable.deleteRow(1);
        }
        let hotData = await requestData("http://127.0.0.1:8000/api/baidu/hot/list");
        if (hotData && hotData.code === 200 && hotData.data.length > 0) {
            hotData.data.forEach(item => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${item.hot_title}</td>
                    <td>${item.hot_score}</td>
                    <td><a href="${item.hot_url}" target="_blank">查看</a></td>
                `;
                hotTable.appendChild(tr);
            });
        }
    }

    // 页面加载完成后执行初始化
    window.onload = initPage;
</script>
</body>
</html>
